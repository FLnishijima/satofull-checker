name: Satofull Auto Checker

on:
  schedule:
    # 毎日4回実行（GitHubの時間は日本時間マイナス9時間）
    - cron: '0 23 * * *'  # 日本時間 08:00
    - cron: '0 3 * * *'   # 日本時間 12:00
    - cron: '0 9 * * *'   # 日本時間 18:00
    - cron: '0 13 * * *'  # 日本時間 22:00
  workflow_dispatch: # 手動実行ボタン

jobs:
  run-checker:
    runs-on: ubuntu-latest
    steps:
      - name: ファイルを読み込む
        uses: actions/checkout@v4

      - name: Pythonを準備する
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 必要な部品（ライブラリ）をインストールする
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: 調査プログラムを実行する！
        run: python satofull.py
